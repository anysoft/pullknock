name: Draft GitHub Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag, for example v0.1.0"
        required: true
        type: string

permissions:
  contents: write

jobs:
  draft:
    name: Create draft release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Resolve tag
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            tag="${{ inputs.tag }}"
          else
            tag="${GITHUB_REF_NAME}"
          fi
          case "$tag" in
            v*) ;;
            *) echo "Release draft tag must start with v, got $tag" >&2; exit 1 ;;
          esac
          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          echo "version=${tag#v}" >> "$GITHUB_OUTPUT"

      - name: Check release tag
        run: python scripts/check_release_tag.py --tag "${{ steps.tag.outputs.tag }}" --require-tag

      - name: Check release notes
        env:
          GITHUB_REF_NAME: ${{ steps.tag.outputs.tag }}
        run: python scripts/check_release_notes.py

      - name: Extract release notes
        run: python scripts/extract_release_notes.py --version "${{ steps.tag.outputs.version }}" --output release-notes.md

      - name: Install build tools
        run: python -m pip install -e ".[release]"

      - name: Build distribution
        run: python -m build

      - name: Check distribution metadata
        run: python -m twine check dist/*

      - name: Verify wheel install
        run: python scripts/verify_wheel_install.py

      - name: Generate SBOM
        run: python scripts/generate_sbom.py

      - name: Create or update draft release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: PullKnock ${{ steps.tag.outputs.tag }}
          body_path: release-notes.md
          files: dist/*
          draft: true
          prerelease: ${{ startsWith(steps.tag.outputs.version, '0.') }}
