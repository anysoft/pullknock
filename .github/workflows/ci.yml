name: CI

on:
  pull_request:
  push:
    branches:
      - master
      - main

permissions:
  contents: read

jobs:
  test:
    name: Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version:
          - "3.10"
          - "3.11"
          - "3.12"

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install package and release tools
        run: python -m pip install -e ".[release]"

      - name: Compile Python files
        run: python -m compileall pullknock tests scripts

      - name: Run unit tests
        run: python -m unittest discover -s tests

      - name: Run E2E file-mode dry-run
        run: python scripts/e2e_file_mode.py

      - name: Generate config schema docs
        run: python scripts/generate_config_schema_docs.py

      - name: Verify generated docs are committed
        run: git diff --exit-code docs/10-config-schema.md
