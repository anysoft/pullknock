name: Security

on:
  pull_request:
  push:
    branches:
      - master
      - main
  schedule:
    - cron: "17 3 * * 1"

permissions:
  contents: read

jobs:
  dependency-scan:
    name: Dependency scan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install package and audit tooling
        run: python -m pip install -e ".[security]"

      - name: Run dependency security scan
        run: python scripts/security_scan.py

      - name: Generate SBOM
        run: python scripts/generate_sbom.py

      - name: Upload SBOM
        uses: actions/upload-artifact@v4
        with:
          name: pullknock-sbom
          path: dist/*-sbom.cdx.json
