name: PR Title

on:
  pull_request:
    types:
      - opened
      - edited
      - reopened
      - synchronize

permissions:
  contents: read

jobs:
  title:
    name: Conventional PR title
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Check PR title
        env:
          PR_TITLE: ${{ github.event.pull_request.title }}
        run: python scripts/check_pr_title.py "$PR_TITLE"
