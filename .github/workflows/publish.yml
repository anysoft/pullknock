name: Publish to PyPI

on:
  release:
    types:
      - published
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    name: Build and publish
    runs-on: ubuntu-latest
    environment: pypi

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install package and release tools
        run: python -m pip install -e ".[release]"

      - name: Require version tag
        run: python scripts/check_release_tag.py --require-tag

      - name: Check release notes
        run: python scripts/check_release_notes.py

      - name: Run release checks
        run: python scripts/release_check.py

      - name: Build distributions
        run: python -m build

      - name: Check distributions
        run: python -m twine check dist/*

      - name: Verify wheel install
        run: python scripts/verify_wheel_install.py

      - name: Generate SBOM
        run: python scripts/generate_sbom.py

      - name: Publish package distributions to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
