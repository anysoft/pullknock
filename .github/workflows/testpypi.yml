name: Publish to TestPyPI

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to publish to TestPyPI, for example v0.1.0"
        required: true
        type: string

permissions:
  contents: read
  id-token: write

jobs:
  publish-testpypi:
    name: Build and publish to TestPyPI
    runs-on: ubuntu-latest
    environment: testpypi

    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref }}

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Install package and release tools
        run: python -m pip install -e ".[release]"

      - name: Require version tag
        run: python scripts/check_release_tag.py --tag "$PULLKNOCK_RELEASE_TAG" --require-tag
        env:
          PULLKNOCK_RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}

      - name: Check release notes
        run: python scripts/check_release_notes.py

      - name: Run release checks
        run: python scripts/release_check.py

      - name: Build distributions
        run: python -m build

      - name: Check distributions
        run: python -m twine check dist/*

      - name: Verify wheel install
        run: python scripts/verify_wheel_install.py

      - name: Generate SBOM
        run: python scripts/generate_sbom.py

      - name: Publish package distributions to TestPyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/
